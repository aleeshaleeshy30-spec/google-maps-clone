  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps - Explore the World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 font-sans">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-2">
                    <span class="text-3xl font-bold text-blue-600">Maps</span>
                </div>
                <div class="hidden md:flex gap-6 text-sm font-medium">
                    <a href="#" onclick="showSection('map')" class="hover:text-blue-600">Map</a>
                    <a href="#" onclick="showSection('directions')" class="hover:text-blue-600">Directions</a>
                </div>
            </div>

            <div class="flex-1 max-w-xl mx-8">
                <input id="search-input" type="text" placeholder="Search places, addresses..." 
                       class="w-full border border-gray-300 rounded-full px-6 py-3 focus:outline-none focus:border-blue-500"
                       onkeyup="if(event.key === 'Enter') searchLocation()">
            </div>

            <div class="flex items-center gap-6">
                <button onclick="showLoginModal()" id="login-btn" class="font-medium">Log in</button>
            </div>
        </div>
    </nav>

    <!-- MAP SECTION -->
    <section id="map-section" class="section h-screen">
        <div id="map" class="w-full h-full"></div>
    </section>

    <!-- DIRECTIONS SECTION -->
    <section id="directions-section" class="section hidden max-w-7xl mx-auto px-6 py-12">
        <h2 class="text-3xl font-bold mb-8">Get Directions</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white rounded-3xl p-8">
                <input id="start" type="text" placeholder="Starting point" class="w-full p-4 border rounded-2xl mb-6">
                <input id="end" type="text" placeholder="Destination" class="w-full p-4 border rounded-2xl mb-6">
                <button onclick="getDirections()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-semibold">Get Directions</button>
            </div>
            <div id="directions-result" class="bg-white rounded-3xl p-8 text-gray-600">
                Directions will appear here (Demo)
            </div>
        </div>
    </section>

    <!-- Login Modal -->
    <div id="login-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4">
            <h2 class="text-2xl font-bold mb-6">Welcome to Maps</h2>
            <input id="login-email" type="text" placeholder="Email" class="w-full p-4 border rounded-2xl mb-4">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-semibold">Sign In</button>
            <p onclick="closeLoginModal()" class="text-center mt-6 text-blue-600 cursor-pointer">Close</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
